services:
  postgres:
    image: postgres:15
    container_name: outbib-postgres
    environment:
      POSTGRES_USER: outbib
      POSTGRES_PASSWORD: outbib
      POSTGRES_DB: outbib
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outbib -d outbib"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: outbib-auth-service
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_auth
      NATS_DISABLED: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
