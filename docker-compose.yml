version: '3.8'

services:
  # --- TEAM SERVICES (Postgres, Redis, Core Apps) ---
  postgres:
    image: postgres:15
    container_name: outbib-postgres
    environment:
      POSTGRES_USER: outbib
      POSTGRES_PASSWORD: outbib
      POSTGRES_DB: outbib
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outbib -d outbib"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - outbib-network

  redis:
    image: redis:7-alpine
    container_name: outbib-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - outbib-network

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: outbib-auth-service
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_auth
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NATS_DISABLED: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - outbib-network

  users-service:
    build:
      context: .
      dockerfile: apps/users-service/Dockerfile
    container_name: outbib-users-service
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_users
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NATS_DISABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - outbib-network

  reminders-migrate:
    build:
      context: .
      dockerfile: apps/reminders-service/Dockerfile
    container_name: outbib-reminders-migrate
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_reminders
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma migrate deploy"]
    restart: "no"
    networks:
      - outbib-network

  reminders-service:
    build:
      context: .
      dockerfile: apps/reminders-service/Dockerfile
    container_name: outbib-reminders-service
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_reminders
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NATS_DISABLED: "true"
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reminders-migrate:
        condition: service_completed_successfully
    networks:
      - outbib-network

  pharmacies-migrate:
    build:
      context: .
      dockerfile: apps/pharmacies-service/Dockerfile
    container_name: outbib-pharmacies-migrate
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_pharmacies
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma migrate deploy --schema apps/pharmacies-service/prisma/schema.prisma"]
    restart: "no"
    networks:
      - outbib-network

  pharmacies-service:
    build:
      context: .
      dockerfile: apps/pharmacies-service/Dockerfile
    container_name: outbib-pharmacies-service
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_pharmacies
      REDIS_URL: redis://redis:6379
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-AIzaSyA75Z-7INV0Kif6vnrgdzABhWHFYHuBZGc}
      MAPS_DEFAULT_COUNTRY: ${MAPS_DEFAULT_COUNTRY:-}
      SYNC_CONCURRENCY: ${SYNC_CONCURRENCY:-3}
    env_file:
      - ./apps/pharmacies-service/.env
    ports:
      - "3004:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pharmacies-migrate:
        condition: service_completed_successfully
    networks:
      - outbib-network

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: outbib-api-gateway
    environment:
      NODE_ENV: production
      PORT: "3000"
      AUTH_URL: http://auth-service:3000
      USERS_URL: http://users-service:3000
      PHARMACIES_URL: http://pharmacies-service:3000
    ports:
      - "8080:3000"
    depends_on:
      auth-service:
        condition: service_started
      users-service:
        condition: service_started
    networks:
      - outbib-network

  # --- YOUR NEW SERVICE ---
  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
      args:
        APP_NAME: ai-service
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    ports:
      - "3009:3000"
    env_file:
      - ./apps/ai-service/.env
    networks:
      - outbib-network

volumes:
  postgres_data:

networks:
  outbib-network:
    driver: bridge
