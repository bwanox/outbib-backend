version: '3.8'

services:
  # --- TEAM SERVICES ---
  postgres:
    image: postgres:15
    container_name: outbib-postgres
    environment:
      POSTGRES_USER: outbib
      POSTGRES_PASSWORD: outbib
      POSTGRES_DB: outbib
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outbib -d outbib"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - outbib-network

  redis:
    image: redis:7-alpine
    container_name: outbib-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - outbib-network

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: outbib-auth-service
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_auth
      NATS_DISABLED: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - outbib-network

  users-service:
    build:
      context: .
      dockerfile: apps/users-service/Dockerfile
    container_name: outbib-users-service
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_users
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NATS_DISABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - outbib-network

  reminders-migrate:
    build:
      context: .
      dockerfile: apps/reminders-service/Dockerfile
    container_name: outbib-reminders-migrate
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_reminders
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma migrate deploy"]
    restart: "no"
    networks:
      - outbib-network

  reminders-service:
    build:
      context: .
      dockerfile: apps/reminders-service/Dockerfile
    container_name: outbib-reminders-service
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_reminders
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NATS_DISABLED: "true"
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      reminders-migrate:
        condition: service_completed_successfully
    networks:
      - outbib-network

  # --- DOCTORS SERVICE (Team's Update) ---
  doctors-service:
    build:
      context: .
      dockerfile: apps/doctors-service/Dockerfile
    container_name: outbib-doctors-service
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://outbib:outbib@postgres:5432/outbib_doctors
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NATS_DISABLED: "true"
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - outbib-network

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: outbib-api-gateway
    environment:
      NODE_ENV: production
      PORT: "3000"
      AUTH_URL: http://auth-service:3000
      USERS_URL: http://users-service:3000
      DOCTORS_URL: http://doctors-service:3000
    ports:
      - "8080:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      users-service:
        condition: service_healthy
      doctors-service:
        condition: service_started
    networks:
      - outbib-network

  # --- YOUR AI SERVICE ---
  ai-service:
    build:
      context: .
      # Point to the ROOT Dockerfile we just fixed
      dockerfile: Dockerfile
      args:
        APP_NAME: ai-service
    command: node dist/apps/ai-service/main
    container_name: outbib-ai-service
    ports:
      - "3009:3009"
    env_file:
      - ./apps/ai-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - outbib-network

volumes:
  postgres_data:

networks:
  outbib-network:
    driver: bridge