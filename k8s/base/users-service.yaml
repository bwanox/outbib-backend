apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
  namespace: outbib
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      initContainers:
        - name: generate
          image: outbib-users-service:dev-20260204-1051
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: outbib-config
            - secretRef:
                name: outbib-secrets
          command:
            - sh
            - -lc
            - |
              npm -w users-service run prisma:generate
        - name: migrate
          image: outbib-users-service:dev-20260204-1051
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: outbib-config
            - secretRef:
                name: outbib-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://outbib:outbib@postgres:5432/outbib_users"
          command: ["sh", "-lc", "npm -w users-service run prisma:migrate:deploy"]
      containers:
        - name: users-service
          image: outbib-users-service:dev-20260204-1051
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: outbib-config
            - secretRef:
                name: outbib-secrets
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              value: "postgresql://outbib:outbib@postgres:5432/outbib_users"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: users-service
  namespace: outbib
spec:
  selector:
    app: users-service
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
