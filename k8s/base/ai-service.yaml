apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: outbib
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: ai-service
          image: ghcr.io/bwanox/outbib-ai-service:git-sha
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: outbib-config
            - secretRef:
                name: outbib-secrets
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              value: "postgresql://outbib:outbib@postgres:5432/outbib_ai"
          readinessProbe:
            httpGet:
              path: /ai/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ai/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: outbib
spec:
  selector:
    app: ai-service
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
