apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: outbib
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      initContainers:
        - name: generate
          image: ghcr.io/bwanox/outbib-auth-service:git-sha
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: outbib-config
            - secretRef:
                name: outbib-secrets
          command:
            - sh
            - -lc
            - |
              npm -w auth-service run prisma:generate
        - name: migrate
          image: ghcr.io/bwanox/outbib-auth-service:git-sha
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: outbib-config
            - secretRef:
                name: outbib-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://outbib:outbib@postgres:5432/outbib_auth"
          command:
            - sh
            - -lc
            - |
              cd /app/apps/auth-service \
              && npm run prisma:migrate:deploy -- --schema=./prisma/schema.prisma
      containers:
        - name: auth-service
          image: ghcr.io/bwanox/outbib-auth-service:git-sha
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: outbib-config
            - secretRef:
                name: outbib-secrets
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              value: "postgresql://outbib:outbib@postgres:5432/outbib_auth"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: outbib
spec:
  selector:
    app: auth-service
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
