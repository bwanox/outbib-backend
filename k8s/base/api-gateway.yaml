apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: outbib
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: api-gateway
          image: ghcr.io/bwanox/outbib-api-gateway:git-sha
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: AUTH_URL
              value: "http://auth-service:3000"
            - name: USERS_URL
              value: "http://users-service:3000"
            - name: DOCTORS_URL
              value: "http://doctors-service:3000"
            - name: PHARMACIES_URL
              value: "http://pharmacies-service:3000"
            - name: REMINDERS_URL
              value: "http://reminders-service:3000"
            - name: EMERGENCIES_URL
              value: "http://emergencies-service:3000"
            - name: AI_URL
              value: "http://ai-service:3000"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: outbib
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
