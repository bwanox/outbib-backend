apiVersion: batch/v1
kind: Job
metadata:
  name: auth-admin-bootstrap
  namespace: outbib
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        job: auth-admin-bootstrap
    spec:
      restartPolicy: Never
      initContainers:
        - name: migrate
          image: outbib-auth-service:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: outbib-config
            - secretRef:
                name: outbib-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://outbib:outbib@postgres:5432/outbib_auth"
          command: ["sh", "-lc", "npm -w auth-service run prisma:migrate:deploy"]
      containers:
        - name: bootstrap
          image: outbib-auth-service:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: outbib-config
            - secretRef:
                name: outbib-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://outbib:outbib@postgres:5432/outbib_auth"
          command: ["node", "dist/auth/bootstrap-admin-job.js"]
